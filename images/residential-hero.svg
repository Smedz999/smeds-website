<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0"/>
      <stop offset="100%" style="stop-color:#e8e8e0"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4a8"/>
      <stop offset="100%" style="stop-color:#c4b498"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F6FF"/>
    </linearGradient>
    <linearGradient id="acGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Room Background -->
  <rect x="0" y="0" width="800" height="450" fill="url(#wallGrad)"/>
  <rect x="0" y="450" width="800" height="150" fill="url(#floorGrad)"/>
  
  <!-- Window -->
  <rect x="100" y="80" width="300" height="220" fill="url(#skyGrad)" stroke="#fff" stroke-width="8"/>
  <rect x="245" y="80" width="10" height="220" fill="#fff"/>
  <rect x="100" y="185" width="300" height="10" fill="#fff"/>
  <!-- Window frame -->
  <rect x="92" y="72" width="316" height="236" fill="none" stroke="#ddd" stroke-width="4"/>
  
  <!-- Clouds -->
  <ellipse cx="180" cy="130" rx="40" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="220" cy="140" rx="50" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="320" cy="110" rx="35" ry="18" fill="white" opacity="0.7"/>
  
  <!-- AC Unit on Wall -->
  <g filter="url(#shadow)">
    <rect x="480" y="120" width="220" height="70" rx="8" fill="url(#acGrad)" stroke="#ddd" stroke-width="1"/>
    <!-- AC Display -->
    <rect x="650" y="135" width="35" height="18" rx="3" fill="#333"/>
    <text x="667" y="148" font-family="Arial" font-size="11" fill="#00ff00" text-anchor="middle">21°C</text>
    <!-- AC Vents -->
    <line x1="500" y1="175" x2="640" y2="175" stroke="#ccc" stroke-width="2"/>
    <line x1="500" y1="180" x2="640" y2="180" stroke="#ccc" stroke-width="2"/>
    <!-- AC Logo -->
    <circle cx="505" cy="145" r="12" fill="#2563eb"/>
    <text x="505" y="149" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">HJS</text>
  </g>
  
  <!-- Cool Air Flow -->
  <path d="M 520 185 Q 500 250 480 320" stroke="#a5d8ff" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
  <path d="M 570 185 Q 550 250 530 320" stroke="#a5d8ff" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
  <path d="M 620 185 Q 600 250 580 320" stroke="#a5d8ff" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
  
  <!-- Modern Sofa -->
  <g filter="url(#shadow)">
    <rect x="150" y="380" width="320" height="80" rx="15" fill="#4a5568"/>
    <rect x="150" y="360" width="320" height="50" rx="10" fill="#5a6578"/>
    <!-- Cushions -->
    <rect x="170" y="340" width="80" height="50" rx="8" fill="#6b7280"/>
    <rect x="270" y="340" width="80" height="50" rx="8" fill="#6b7280"/>
    <rect x="370" y="340" width="80" height="50" rx="8" fill="#6b7280"/>
  </g>
  
  <!-- Coffee Table -->
  <g filter="url(#shadow)">
    <ellipse cx="310" cy="480" rx="100" ry="30" fill="#8b7355"/>
    <rect x="230" y="480" width="160" height="15" fill="#7a6548"/>
  </g>
  
  <!-- Plant -->
  <g filter="url(#shadow)">
    <rect x="620" y="400" width="40" height="50" rx="5" fill="#c4a574"/>
    <ellipse cx="640" cy="380" rx="50" ry="40" fill="#4ade80"/>
    <ellipse cx="620" cy="370" rx="35" ry="30" fill="#22c55e"/>
    <ellipse cx="660" cy="375" rx="30" ry="25" fill="#16a34a"/>
  </g>
  
  <!-- Wall Art -->
  <rect x="520" y="250" width="120" height="90" fill="white" stroke="#ddd" stroke-width="3"/>
  <circle cx="580" cy="295" r="25" fill="#e0e7ff"/>
  <rect x="545" y="315" width="70" height="4" fill="#ddd"/>
  <rect x="555" y="325" width="50" height="4" fill="#ddd"/>
  
  <!-- Floor Lamp -->
  <g filter="url(#shadow)">
    <rect x="80" y="350" width="8" height="100" fill="#4a5568"/>
    <ellipse cx="84" cy="450" rx="25" ry="8" fill="#4a5568"/>
    <path d="M 60 350 Q 84 300 108 350" fill="#fef3c7" opacity="0.9"/>
  </g>
  
  <!-- Rug -->
  <ellipse cx="400" cy="520" rx="200" ry="40" fill="#e5e7eb" opacity="0.5"/>
</svg>