<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="50%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect x="0" y="0" width="800" height="350" fill="url(#skyGrad)"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="60" ry="30" fill="white" opacity="0.8"/>
  <ellipse cx="200" cy="95" rx="70" ry="35" fill="white" opacity="0.8"/>
  <ellipse cx="650" cy="60" rx="50" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="700" cy="75" rx="60" ry="30" fill="white" opacity="0.7"/>
  
  <!-- Ground/Street -->
  <rect x="0" y="500" width="800" height="100" fill="#64748b"/>
  <rect x="0" y="500" width="800" height="8" fill="#475569"/>
  
  <!-- Sidewalk -->
  <rect x="0" y="480" width="800" height="20" fill="#94a3b8"/>
  <line x1="0" y1="485" x2="800" y2="485" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Main Commercial Building -->
  <g filter="url(#shadow)">
    <rect x="200" y="100" width="400" height="380" fill="url(#buildingGrad)" rx="5"/>
    
    <!-- Building Top Accent -->
    <rect x="190" y="90" width="420" height="15" fill="#1e40af" rx="3"/>
    <text x="400" y="102" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">HJS BUSINESS SERVICES</text>
    
    <!-- Glass Windows Grid -->
    <g id="windows">
      <!-- Row 1 -->
      <rect x="220" y="130" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="305" y="130" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="390" y="130" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="475" y="130" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="560" y="130" width="25" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      
      <!-- Row 2 -->
      <rect x="220" y="235" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="305" y="235" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="390" y="235" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="475" y="235" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="560" y="235" width="25" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      
      <!-- Row 3 -->
      <rect x="220" y="340" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="305" y="340" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="390" y="340" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="475" y="340" width="70" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="560" y="340" width="25" height="90" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="2"/>
    </g>
    
    <!-- Window Reflections -->
    <polygon points="220,130 255,130 235,220 220,220" fill="white" opacity="0.2"/>
    <polygon points="305,130 340,130 320,220 305,220" fill="white" opacity="0.2"/>
    <polygon points="390,130 425,130 405,220 390,220" fill="white" opacity="0.2"/>
    <polygon points="220,235 255,235 235,325 220,325" fill="white" opacity="0.2"/>
    <polygon points="305,235 340,235 320,325 305,325" fill="white" opacity="0.2"/>
    <polygon points="390,235 425,235 405,325 390,325" fill="white" opacity="0.2"/>
    
    <!-- Entrance -->
    <rect x="320" y="440" width="160" height="40" fill="#1e3a5f"/>
    <rect x="325" y="445" width="70" height="35" fill="#60a5fa" opacity="0.3"/>
    <rect x="405" y="445" width="70" height="35" fill="#60a5fa" opacity="0.3"/>
    <rect x="395" y="440" width="10" height="40" fill="#94a3b8"/>
    
    <!-- Entrance Canopy -->
    <rect x="300" y="430" width="200" height="12" fill="#334155" rx="3"/>
    <rect x="310" y="425" width="180" height="8" fill="#475569" rx="2"/>
  </g>
  
  <!-- External AC Units on Roof -->
  <g filter="url(#shadow)">
    <rect x="250" y="55" width="80" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="260" y1="65" x2="320" y2="65" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="260" y1="72" x2="320" y2="72" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="260" cy="62" r="4" fill="#2563eb"/>
    <rect x="285" y="58" width="30" height="10" rx="2" fill="#333"/>
    <text x="300" y="66" font-family="Arial" font-size="6" fill="#00ff00" text-anchor="middle">HJS</text>
    
    <rect x="350" y="55" width="80" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="360" y1="65" x2="420" y2="65" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="360" y1="72" x2="420" y2="72" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="360" cy="62" r="4" fill="#2563eb"/>
    
    <rect x="450" y="55" width="80" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="460" y1="65" x2="520" y2="65" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="460" y1="72" x2="520" y2="72" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="460" cy="62" r="4" fill="#2563eb"/>
  </g>
  
  <!-- Side Building Left -->
  <g filter="url(#shadow)">
    <rect x="50" y="200" width="130" height="280" fill="#f1f5f9" rx="3"/>
    <rect x="60" y="220" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="110" y="220" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="60" y="285" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="110" y="285" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="60" y="350" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="110" y="350" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Side building AC -->
    <rect x="70" y="170" width="50" height="25" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="75" y1="178" x2="115" y2="178" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="75" y1="184" x2="115" y2="184" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  
  <!-- Side Building Right -->
  <g filter="url(#shadow)">
    <rect x="620" y="180" width="130" height="300" fill="#f8fafc" rx="3"/>
    <rect x="630" y="200" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="680" y="200" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="630" y="265" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="680" y="265" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="630" y="330" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="680" y="330" width="40" height="50" fill="url(#glassGrad)" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Side building AC -->
    <rect x="670" y="150" width="50" height="25" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="675" y1="158" x2="715" y2="158" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="675" y1="164" x2="715" y2="164" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  
  <!-- Trees -->
  <g filter="url(#shadow)">
    <rect x="120" y="420" width="15" height="60" fill="#8b6914"/>
    <circle cx="127" cy="400" r="35" fill="#22c55e"/>
    <circle cx="115" cy="390" r="25" fill="#16a34a"/>
    <circle cx="140" cy="395" r="28" fill="#4ade80"/>
    
    <rect x="680" y="420" width="15" height="60" fill="#8b6914"/>
    <circle cx="687" cy="400" r="35" fill="#22c55e"/>
    <circle cx="675" cy="390" r="25" fill="#16a34a"/>
    <circle cx="700" cy="395" r="28" fill="#4ade80"/>
  </g>
  
  <!-- Street Lamp -->
  <g filter="url(#shadow)">
    <rect x="170" y="380" width="6" height="100" fill="#475569"/>
    <rect x="165" y="375" width="16" height="8" fill="#334155" rx="2"/>
    <circle cx="173" cy="370" r="12" fill="#fef3c7" opacity="0.9"/>
  </g>
  
  <!-- HJS Van (subtle) -->
  <g filter="url(#shadow)">
    <rect x="520" y="460" width="90" height="35" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>
    <rect x="525" y="465" width="25" height="15" rx="3" fill="#2563eb"/>
    <text x="537" y="476" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">HJS</text>
    <circle cx="545" cy="495" r="8" fill="#333"/>
    <circle cx="545" cy="495" r="4" fill="#666"/>
    <circle cx="585" cy="495" r="8" fill="#333"/>
    <circle cx="585" cy="495" r="4" fill="#666"/>
  </g>
</svg>