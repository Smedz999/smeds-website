<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:0.98"/>
    </linearGradient>
  </defs>
  
  <!-- Background Room Scene -->
  <rect x="0" y="0" width="1200" height="600" fill="#f5f5f0"/>
  
  <!-- Large Window -->
  <rect x="100" y="50" width="500" height="350" fill="#e0f2fe"/>
  <rect x="100" y="50" width="500" height="10" fill="white"/>
  <rect x="100" y="50" width="10" height="350" fill="white"/>
  <rect x="590" y="50" width="10" height="350" fill="white"/>
  <rect x="100" y="390" width="500" height="10" fill="white"/>
  <rect x="345" y="50" width="10" height="350" fill="white"/>
  <rect x="100" y="200" width="500" height="10" fill="white"/>
  
  <!-- Sky through window -->
  <rect x="110" y="60" width="235" height="140" fill="#87CEEB"/>
  <rect x="355" y="60" width="235" height="140" fill="#87CEEB"/>
  <rect x="110" y="210" width="235" height="180" fill="#93c5fd"/>
  <rect x="355" y="210" width="235" height="180" fill="#93c5fd"/>
  
  <!-- Clouds -->
  <ellipse cx="200" cy="120" rx="40" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="250" cy="130" rx="50" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="450" cy="100" rx="35" ry="18" fill="white" opacity="0.7"/>
  
  <!-- Kitchen Counter -->
  <rect x="650" y="250" width="550" height="20" fill="#e5e7eb"/>
  <rect x="650" y="270" width="550" height="330" fill="#f3f4f6"/>
  
  <!-- Kitchen Cabinets -->
  <rect x="670" y="300" width="120" height="80" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <rect x="810" y="300" width="120" height="80" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <rect x="950" y="300" width="120" height="80" fill="white" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Countertop Items -->
  <rect x="700" y="220" width="40" height="30" rx="3" fill="#fbbf24"/>
  <rect x="760" y="230" width="30" height="20" rx="2" fill="#f87171"/>
  <rect x="850" y="225" width="50" height="25" rx="3" fill="#34d399"/>
  
  <!-- Wall-Mounted AC Unit -->
  <rect x="800" y="100" width="200" height="60" rx="8" fill="white" stroke="#d1d5db" stroke-width="2"/>
  <rect x="820" y="115" width="120" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="820" y="128" width="120" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="960" y="110" width="25" height="18" rx="3" fill="#1f2937"/>
  <text x="972" y="123" font-family="Arial" font-size="10" fill="#10b981" text-anchor="middle">21°</text>
  
  <!-- Dining Table -->
  <ellipse cx="350" cy="480" rx="180" ry="60" fill="#d4c4a8"/>
  <rect x="200" y="480" width="20" height="80" fill="#8b7355"/>
  <rect x="480" y="480" width="20" height="80" fill="#8b7355"/>
  
  <!-- Chairs -->
  <rect x="250" y="450" width="40" height="50" rx="5" fill="#6b7280"/>
  <rect x="340" y="440" width="40" height="50" rx="5" fill="#6b7280"/>
  <rect x="430" y="450" width="40" height="50" rx="5" fill="#6b7280"/>
  
  <!-- Floor -->
  <rect x="0" y="520" width="1200" height="80" fill="#c4b498"/>
  
  <!-- Plant -->
  <rect x="100" y="420" width="30" height="60" rx="5" fill="#a0522d"/>
  <ellipse cx="115" cy="400" rx="40" ry="35" fill="#22c55e"/>
  <ellipse cx="95" cy="385" rx="25" ry="22" fill="#16a34a"/>
  <ellipse cx="135" cy="390" rx="28" ry="24" fill="#4ade80"/>
  
  <!-- Blue Overlay for Watermark Effect -->
  <rect x="0" y="0" width="1200" height="600" fill="url(#overlay)"/>
</svg>