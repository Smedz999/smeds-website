<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:0.98"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#334155;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  
  <!-- Evening Sky -->
  <rect x="0" y="0" width="1200" height="300" fill="#1e3a5f"/>
  <rect x="0" y="100" width="1200" height="200" fill="#1e40af" opacity="0.5"/>
  
  <!-- Stars -->
  <circle cx="100" cy="50" r="2" fill="white" opacity="0.8"/>
  <circle cx="250" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="400" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="550" cy="70" r="1" fill="white" opacity="0.7"/>
  <circle cx="700" cy="55" r="2" fill="white" opacity="0.8"/>
  <circle cx="850" cy="85" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1000" cy="45" r="2" fill="white" opacity="0.9"/>
  <circle cx="1150" cy="75" r="1" fill="white" opacity="0.7"/>
  
  <!-- Main Building -->
  <rect x="200" y="150" width="600" height="350" fill="#374151"/>
  <rect x="190" y="140" width="620" height="15" fill="#1f2937"/>
  
  <!-- HJS Sign -->
  <rect x="420" y="155" width="160" height="30" fill="#1f2937" rx="3"/>
  <text x="500" y="175" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">HJS</text>
  
  <!-- Glass Windows -->
  <g fill="url(#glassGrad)" stroke="#4b5563" stroke-width="2">
    <!-- Row 1 -->
    <rect x="220" y="200" width="100" height="80"/>
    <rect x="340" y="200" width="100" height="80"/>
    <rect x="460" y="200" width="100" height="80"/>
    <rect x="580" y="200" width="100" height="80"/>
    <rect x="700" y="200" width="80" height="80"/>
    
    <!-- Row 2 -->
    <rect x="220" y="300" width="100" height="80"/>
    <rect x="340" y="300" width="100" height="80"/>
    <rect x="460" y="300" width="100" height="80"/>
    <rect x="580" y="300" width="100" height="80"/>
    <rect x="700" y="300" width="80" height="80"/>
    
    <!-- Row 3 -->
    <rect x="220" y="400" width="100" height="80"/>
    <rect x="340" y="400" width="100" height="80"/>
    <rect x="460" y="400" width="100" height="80"/>
    <rect x="580" y="400" width="100" height="80"/>
    <rect x="700" y="400" width="80" height="80"/>
  </g>
  
  <!-- Interior Lights (warm glow) -->
  <rect x="230" y="210" width="80" height="60" fill="#fbbf24" opacity="0.3"/>
  <rect x="350" y="210" width="80" height="60" fill="#fbbf24" opacity="0.4"/>
  <rect x="470" y="310" width="80" height="60" fill="#fbbf24" opacity="0.3"/>
  <rect x="590" y="310" width="80" height="60" fill="#fbbf24" opacity="0.5"/>
  <rect x="350" y="410" width="80" height="60" fill="#fbbf24" opacity="0.4"/>
  <rect x="590" y="410" width="80" height="60" fill="#fbbf24" opacity="0.3"/>
  
  <!-- Side Building Left -->
  <rect x="50" y="250" width="120" height="250" fill="#4b5563"/>
  <rect x="60" y="270" width="40" height="50" fill="#1e293b" opacity="0.8"/>
  <rect x="110" y="270" width="40" height="50" fill="#1e293b" opacity="0.8"/>
  <rect x="60" y="340" width="40" height="50" fill="#1e293b" opacity="0.8"/>
  <rect x="110" y="340" width="40" height="50" fill="#1e293b" opacity="0.8"/>
  <rect x="60" y="410" width="40" height="50" fill="#1e293b" opacity="0.8"/>
  <rect x="110" y="410" width="40" height="50" fill="#1e293b" opacity="0.8"/>
  
  <!-- Side Building Right -->
  <rect x="830" y="220" width="150" height="280" fill="#4b5563"/>
  <rect x="840" y="240" width="50" height="60" fill="#1e293b" opacity="0.8"/>
  <rect x="900" y="240" width="50" height="60" fill="#1e293b" opacity="0.8"/>
  <rect x="840" y="320" width="50" height="60" fill="#1e293b" opacity="0.8"/>
  <rect x="900" y="320" width="50" height="60" fill="#1e293b" opacity="0.8"/>
  <rect x="840" y="400" width="50" height="60" fill="#1e293b" opacity="0.8"/>
  <rect x="900" y="400" width="50" height="60" fill="#1e293b" opacity="0.8"/>
  
  <!-- Ground/Street -->
  <rect x="0" y="500" width="1200" height="100" fill="#374151"/>
  <rect x="0" y="500" width="1200" height="5" fill="#1f2937"/>
  
  <!-- Street Lights -->
  <rect x="150" y="400" width="6" height="100" fill="#4b5563"/>
  <circle cx="153" cy="395" r="12" fill="#fbbf24" opacity="0.9"/>
  
  <rect x="1050" y="400" width="6" height="100" fill="#4b5563"/>
  <circle cx="1053" cy="395" r="12" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Blue Overlay for Watermark Effect -->
  <rect x="0" y="0" width="1200" height="600" fill="url(#overlay)"/>
</svg>